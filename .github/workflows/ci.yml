name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:

  code-quality:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linter
        run: |
          pip install flake8

      - name: Run Linter
        run: |
          flake8 .