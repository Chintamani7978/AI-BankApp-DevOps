name: AI Bank DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - docker
      - ai

jobs:

  code-scan:
    name: Code Scan (Maven Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Application
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests
        
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    needs: code-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  dependency-scan:
    name: Dependency Scan (Trivy FS)
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy File Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: dependency-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USER }}/ai-bankapp:latest
            ${{ vars.DOCKERHUB_USER }}/ai-bankapp:${{ github.sha }}

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ vars.DOCKERHUB_USER }}/ai-bankapp:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: container-scan

    steps:
      - name: Deploy Application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          env: |
            DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
          script: |
            cd ~/ai-bank-setup
            
            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            
            # Pull latest images and restart services
            docker-compose pull
            docker-compose down || true
            docker-compose up -d
            
            # Wait for services to be healthy
            sleep 10
            
            # Show status
            docker-compose ps
            
            echo "✅ Deployment completed successfully!"
            echo "Application URL: http://$(hostname -I | awk '{print $1}'):8080"